<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for a Credit Card - FraudGuard Bank</title>
</head>
<body>
    <h1>Credit Card Application</h1>

    <!--
        This form sends data to the /apply route using the POST method.
        POST means "I'm submitting data to be saved," as opposed to GET
        which just means "give me a page to look at."
    -->
    <form action="/apply" method="POST">

        <!--
            For the demo, we let the applicant pick WHICH existing user
            they're claiming to be. In real life this doesn't exist as a
            dropdown -- the "user_id" would be figured out behind the
            scenes by matching name/SSN/etc. We use a dropdown here only
            so we can easily simulate different scenarios.
        -->
        <label for="user_id">Applying as which existing customer (for demo purposes):</label><br>
        <select name="user_id" id="user_id" required>
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.full_name }} ({{ user.email }})</option>
            {% endfor %}
        </select>
        <br><br>

        <label for="applicant_name">Full Name on Application:</label><br>
        <input type="text" name="applicant_name" id="applicant_name" required><br><br>

        <label for="applicant_email">Email on Application:</label><br>
        <input type="email" name="applicant_email" id="applicant_email" required><br><br>

        <label for="applicant_phone">Phone on Application:</label><br>
        <input type="text" name="applicant_phone" id="applicant_phone" required><br><br>

        <label for="applicant_address">Mailing Address on Application:</label><br>
        <input type="text" name="applicant_address" id="applicant_address" required><br><br>

        <label for="ssn_last4_provided">Last 4 of SSN Provided:</label><br>
        <input type="text" name="ssn_last4_provided" id="ssn_last4_provided" maxlength="4" required><br><br>

        <button type="submit">Submit Application</button>
    </form>
</body>
</html>
